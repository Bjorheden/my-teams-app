# .github/workflows/ci.yml
# ─────────────────────────────────────────────────────────────────
# LEARNING NOTE – GitHub Actions CI
#
# This workflow runs on every push to `main` and every Pull Request.
# It has two independent jobs that run in parallel:
#   1. backend-ci  – lint + tests for the FastAPI app
#   2. mobile-ci   – TypeScript typecheck + ESLint for the Expo app
#
# Checkpoints that expand this file:
#   CP4 – adds ruff lint/format and pytest steps (already stubbed here)
#   CP5 – adds "docker-smoke-test" job that builds the image and
#          calls /v1/healthz to prove the container works
#
# Key concepts to understand:
#   `on:`          – trigger conditions
#   `jobs:`        – independent units of work (run on separate VMs)
#   `steps:`       – sequential commands inside a job
#   `uses:`        – reuse a pre-built Action from the marketplace
#   `run:`         – run a shell command
#   `needs:`       – job dependency (wait for another job first)
# ─────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch when a new push arrives.
# Saves CI minutes and keeps the queue clean.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: Backend CI
  # Runs: ruff lint, ruff format check, pytest
  #
  # CP1: we run tests directly with pip (no Docker yet)
  # CP5: we'll add a Docker build + smoke test as a separate job
  # ──────────────────────────────────────────────────────────────
  backend-ci:
    name: Backend – lint & test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          # Cache pip downloads to speed up subsequent runs
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies (runtime + dev extras)
        # `pip install -e ".[dev]"` installs the package in editable mode
        # plus the [dev] optional dependencies (ruff, pytest, httpx).
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        # ruff check exits with code 1 if there are lint errors → job fails
        run: python -m ruff check app

      - name: Check formatting with ruff
        # ruff format --check exits with code 1 if files need reformatting
        run: python -m ruff format --check app

      - name: Run tests with pytest
        run: python -m pytest app/tests -v --tb=short

      - name: Type-check with mypy
        # mypy reads [tool.mypy] from pyproject.toml.
        # LEARNING NOTE: mypy checks types ACROSS files, so it catches bugs
        # like passing None where a str is expected, which ruff cannot see.
        # `--package app` tells mypy to check the whole `app` package.
        run: python -m mypy --package app

  # ──────────────────────────────────────────────────────────────
  # Job 2: Mobile CI
  # Runs: TypeScript typecheck + ESLint
  # ──────────────────────────────────────────────────────────────
  mobile-ci:
    name: Mobile – typecheck & lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install npm dependencies
        # `npm ci` is faster than `npm install` and guarantees exact versions
        # from package-lock.json (fails if lock file is missing or out of sync).
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint app --ext .ts,.tsx --max-warnings 0

  # ──────────────────────────────────────────────────────────────
  # Job 3: Docker smoke test (Checkpoint 5)
  #
  # LEARNING NOTE – why this job exists:
  #   CI can pass (lint + tests green) even if the Dockerfile is broken.
  #   This job proves the *container* actually builds and starts correctly.
  #
  # Key concepts:
  #   `needs:`            – only run after backend-ci passes
  #   docker build        – same command as `docker compose up --build`
  #   --health-cmd        – Docker polls this; we wait until healthy
  #   docker inspect      – reads the healthcheck status from container metadata
  #   curl --fail         – exits non-zero on HTTP error → job fails
  # ──────────────────────────────────────────────────────────────
  docker-smoke-test:
    name: Docker – build & smoke test
    runs-on: ubuntu-latest
    needs: backend-ci      # only run if lint + tests pass first

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend Docker image
        # Build the image exactly as it would be built in production.
        # The tag `myteams-backend:ci` is local to this job.
        run: docker build -t myteams-backend:ci ./backend

      - name: Start container
        # --health-cmd lets Docker poll the app for us.
        # We use the same urllib check as docker-compose.yml.
        run: |
          docker run -d \
            --name backend-test \
            -p 8000:8000 \
            --health-cmd "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/healthz')\"" \
            --health-interval 3s \
            --health-retries 10 \
            --health-start-period 5s \
            myteams-backend:ci

      - name: Wait for container to be healthy
        # Poll Docker's own health status instead of arbitrary sleep.
        # Fails fast if the container crashes instead of waiting the full timeout.
        run: |
          for i in $(seq 1 20); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' backend-test)
            echo "Health status: $STATUS (attempt $i)"
            if [ "$STATUS" = "healthy" ]; then
              echo "Container is healthy!"
              exit 0
            fi
            if [ "$STATUS" = "unhealthy" ]; then
              echo "Container is unhealthy. Logs:"
              docker logs backend-test
              exit 1
            fi
            sleep 3
          done
          echo "Timed out waiting for container to become healthy. Logs:"
          docker logs backend-test
          exit 1

      - name: Smoke test – GET /v1/healthz
        # curl --fail exits with non-zero if HTTP status >= 400
        run: |
          curl --fail --silent --show-error http://localhost:8000/v1/healthz
          echo ""
          echo "Smoke test passed!"

      - name: Smoke test – GET /v1/readyz
        run: curl --fail --silent --show-error http://localhost:8000/v1/readyz

      - name: Print container logs (always, for debugging)
        if: always()
        run: docker logs backend-test

      - name: Stop and remove container
        if: always()   # clean up even if earlier steps failed
        run: docker rm -f backend-test
  #         echo "Smoke test passed!"
  #
