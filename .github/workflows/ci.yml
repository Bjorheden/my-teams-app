# .github/workflows/ci.yml
# ─────────────────────────────────────────────────────────────────
# LEARNING NOTE – GitHub Actions CI
#
# This workflow runs on every push to `main` and every Pull Request.
# It has two independent jobs that run in parallel:
#   1. backend-ci  – lint + tests for the FastAPI app
#   2. mobile-ci   – TypeScript typecheck + ESLint for the Expo app
#
# Checkpoints that expand this file:
#   CP4 – adds ruff lint/format and pytest steps (already stubbed here)
#   CP5 – adds "docker-smoke-test" job that builds the image and
#          calls /v1/healthz to prove the container works
#
# Key concepts to understand:
#   `on:`          – trigger conditions
#   `jobs:`        – independent units of work (run on separate VMs)
#   `steps:`       – sequential commands inside a job
#   `uses:`        – reuse a pre-built Action from the marketplace
#   `run:`         – run a shell command
#   `needs:`       – job dependency (wait for another job first)
# ─────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch when a new push arrives.
# Saves CI minutes and keeps the queue clean.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: Backend CI
  # Runs: ruff lint, ruff format check, pytest
  #
  # CP1: we run tests directly with pip (no Docker yet)
  # CP5: we'll add a Docker build + smoke test as a separate job
  # ──────────────────────────────────────────────────────────────
  backend-ci:
    name: Backend – lint & test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          # Cache pip downloads to speed up subsequent runs
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies (runtime + dev extras)
        # `pip install -e ".[dev]"` installs the package in editable mode
        # plus the [dev] optional dependencies (ruff, pytest, httpx).
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        # ruff check exits with code 1 if there are lint errors → job fails
        run: python -m ruff check app

      - name: Check formatting with ruff
        # ruff format --check exits with code 1 if files need reformatting
        run: python -m ruff format --check app

      - name: Run tests with pytest
        run: python -m pytest app/tests -v --tb=short

  # ──────────────────────────────────────────────────────────────
  # Job 2: Mobile CI
  # Runs: TypeScript typecheck + ESLint
  # ──────────────────────────────────────────────────────────────
  mobile-ci:
    name: Mobile – typecheck & lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint app --ext .ts,.tsx --max-warnings 0

  # ──────────────────────────────────────────────────────────────
  # Job 3: Docker smoke test (STUB – activated in Checkpoint 5)
